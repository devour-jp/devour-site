apiVersion: devour.jp/v1alpha1
kind: Component
metadata:
  name: taskflow
  description:
    short: "シンプルで高速なタスク管理アプリ。ドラッグ&ドロップでカンバンボード操作。"
    long: "TaskFlow は個人やチームのタスク管理を効率化する Web アプリケーションです。\n直感的なドラッグ&ドロップでカンバンボードを操作でき、リアルタイム共同編集にも対応。\nPWA として動作するため、オフラインでもタスクの確認・編集が可能です。"
  tags:
    - react
    - typescript
    - pwa
    - productivity
    - kanban
    - collaboration
    - offline
    - cloudflare
    - hono
    - realtime
  links:
    - url: https://github.com/example/taskflow
    - url: https://apps.apple.com/example/taskflow
    - url: https://play.google.com/store/apps/details?id=example.taskflow
    - url: https://youtube.com/watch?v=example
    - url: https://store.steampowered.com/app/12345
    - url: https://x.com/example
    - url: https://discord.gg/example
    - url: https://bsky.app/profile/example
    - url: https://zenn.dev/example
    - url: https://note.com/example
    - url: https://example.com
      title: 公式サイト
spec:
  type: website
  lifecycle: production
  owner: devour-jp
  devour:
    card:
      bg: "#6366f1"
      fg: "#ffffff"
    category: "productivity"
    release:
      current:
        version: "2.1.0"
        date: "2026-03-21"
        headline:
          short: "リアルタイム共同編集に対応"
          long: "リアルタイム共同編集に対応しました。\n複数人で同時にカンバンボードを操作できます。WebSocket による低遅延の同期を実現。"
      next:
        version: "2.2.0"
        date: "2026-04-15"
        headline:
          short: "ガントチャートビュー追加"
          long: "ガントチャートビューを追加予定です。\nタスクの期間と依存関係を視覚的に表示。プロジェクト管理がさらに便利になります。"
    author:
      comment:
        short: "テストデータです。"
        long: "テストデータです。\n実際のプロジェクトではありませんが、全フィールドの表示確認用として使用しています。"
