    devour.jp/headline: "これは80文字を超える非常に長いヘッドラインです。機能追加とバグ修正とパフォーマンス改善とUIリニューアルとドキュメント整備を同時にリリースしました。"
    devour.jp/comment: "これは100文字を超える長い作者コメントです。個人開発を続けていると色々なことがあるけれど、毎日少しずつ進めていくことが大事だと思います。皆さんも頑張りましょう。"
