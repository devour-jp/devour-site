apiVersion: devour.jp/v1alpha1
kind: Component
metadata:
  name: kokosuki
  description:
    short: "ここすき 散歩×命名アプリ。子どもと歩いた場所に名前をつけて記録。"
    long: "ここすき は散歩×命名アプリです。子どもと一緒に街を歩いて、お気に入りの場所に自分だけの名前をつけて記録できます。\n位置情報はプライバシーに配慮し、自宅からの相対値として保存。Unity で開発しています。\n現在iOSのみ公開中"
  tags:
    - unity
    - ios
    - android
    - kids
    - walking
  links:
    - url: https://apps.apple.com/us/app/%E3%81%93%E3%81%93%E3%81%99%E3%81%8D/id6760634470
    - url: https://note.com/namelesscode/n/n8a89f378e012
    - url: https://devour.jp/apps/kokosuki/
      title: 紹介サイト
spec:
  type: game
  lifecycle: production
  owner: devour-jp
  devour:
    image: "https://devour.jp/apps/kokosuki/promotion/ogp_1200x630.png"
    card:
      bg: "#4CAF50"
      fg: "#FFFFFF"
    release:
      current:
        version: "1.0.1"
        date: "2026-03-23"
        headline:
          short: "フィルター改善 + メッセージ文言改善"
          long: "フィルター改善＋メッセージ文言改善を実施しました。\n地図フィルターの応答速度を向上させ、子ども向けのメッセージ表現をひらがな中心に統一しています。"
    author:
      comment:
        short: "子どもと一緒に街を探検しよう"
        long: "子どもと一緒に街を探検しよう！\n名前をつけた場所が増えていくと、自分だけの地図ができあがります。親子の思い出を残すツールとしても使ってほしいです。"
    social:
      x:
        account: "DEVOUR_JP"
        fix: "2037208350895812662"
        latest:
          query: "ここすき"
    org:
      bio:
        short: "子ども向けアプリと開発ツールを作ってます。街を歩いて名前をつけるアプリ「ここすき」、個人開発のダッシュボード「Creators Dashboard」を開発中。"
        long: "子ども向けアプリと開発ツールを作っています。\n\n主なプロジェクトは「ここすき」（散歩×命名アプリ）と「Creators Dashboard」（個人開発者向けダッシュボード）です。\n\nここすき は子どもと一緒に街を歩いて、お気に入りの場所に名前をつけて記録できるアプリです。位置情報はプライバシーに配慮し、自宅からの相対値として保存しています。\n\nCreators Dashboard は GitHub リポジトリに YAML ファイルを置くだけで、プロジェクトの最新情報がカード型 UI で一覧表示されます。\n\n技術ブログは Zenn と note で発信中です。"
      links:
        - url: https://github.com/devour-jp
        - url: https://zenn.dev/nonamecode
        - url: https://note.com/namelesscode
        - url: https://x.com/DEVOUR_JP/
        - url: https://devour.jp
          title: 公式サイト
      social:
        x:
          account: "DEVOUR_JP"
          fix: "2037714443686293785"
