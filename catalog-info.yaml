      title: GitHub
    - url: https://example.com/demo
      title: Demo
    - url: https://example.com/docs
      title: Website
    - url: https://discord.gg/example
      title: Discord
    - url: https://x.com/example
      title: X
    - url: https://example.com/extra-should-be-cut
